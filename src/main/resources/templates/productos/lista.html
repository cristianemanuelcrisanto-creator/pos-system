<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container">
    <h1 class="page-title">Productos</h1>
    <p class="subtitle">Administra inventario, precios y stock disponible.</p>

    <div class="card">
        <div class="actions-inline" style="margin-bottom: 18px;">
            <a th:href="@{/productos/nuevo}">Nuevo producto</a>
            <a th:href="@{/}" class="btn btn-secondary">Inicio</a>
        </div>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Categoría</th>
                <th>Compra</th>
                <th>Venta</th>
                <th>Stock</th>
                <th>Stock mínimo</th>
                <th>Unidad</th>
                <th>Activo</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="producto : ${productos}">
                <td th:text="${producto.id}"></td>
                <td th:text="${producto.nombre}"></td>
                <td th:text="${producto.categoria}"></td>
                <td th:text="${producto.precioCompra}"></td>
                <td th:text="${producto.precioVenta}"></td>
                <td th:text="${producto.stockActual}"></td>
                <td th:text="${producto.stockMinimo}"></td>
                <td th:text="${producto.unidad}"></td>
                <td th:text="${producto.activo}"></td>
                <td class="table-actions">
                    <a th:href="@{/productos/editar/{id}(id=${producto.id})}">Editar</a>
                    <a th:href="@{/productos/eliminar/{id}(id=${producto.id})}"
                       onclick="return confirm('¿Seguro que quieres eliminar este producto?')">
                        Eliminar
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <a th:href="@{/}" class="link-back">Volver al inicio</a>
</div>
</body>
</html>
