<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Producto</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container">
    <h1 class="page-title">Producto</h1>
    <p class="subtitle">Crea o actualiza la información del producto.</p>

    <div class="card form-card">
        <form th:action="@{/productos/guardar}" th:object="${producto}" method="post">
            <input type="hidden" th:field="*{id}">

            <label>Nombre:</label>
            <input type="text" th:field="*{nombre}" required>

            <label>Categoría:</label>
            <input type="text" th:field="*{categoria}" required>

            <label>Precio compra:</label>
            <input type="number" step="0.01" th:field="*{precioCompra}" required>

            <label>Precio venta:</label>
            <input type="number" step="0.01" th:field="*{precioVenta}" required>

            <label>Stock actual:</label>
            <input type="number" th:field="*{stockActual}" required>

            <label>Stock mínimo:</label>
            <input type="number" th:field="*{stockMinimo}" required>

            <label>Unidad:</label>
            <input type="text" th:field="*{unidad}" required>

            <label style="margin-bottom: 8px;">Activo:</label>
            <div style="margin-bottom: 18px;">
                <input type="checkbox" th:field="*{activo}" style="width:auto; margin-right: 8px;">
                <span>Producto habilitado</span>
            </div>

            <div class="actions-inline">
                <button type="submit">Guardar</button>
                <a th:href="@{/productos}" class="btn btn-secondary">Volver</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
