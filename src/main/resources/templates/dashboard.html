<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container">
    <h1 class="page-title">Dashboard del Negocio</h1>
    <p class="subtitle">Resumen general de ventas, gastos y productos.</p>

    <div class="grid grid-2">
        <div class="stat-card">
            <div class="stat-label">Total de ventas</div>
            <div class="stat-value">$<span th:text="${totalVentas}"></span></div>
        </div>

        <div class="stat-card">
            <div class="stat-label">Total de gastos</div>
            <div class="stat-value">$<span th:text="${totalGastos}"></span></div>
        </div>

        <div class="stat-card">
            <div class="stat-label">Utilidad estimada</div>
            <div class="stat-value">$<span th:text="${utilidad}"></span></div>
        </div>

        <div class="stat-card">
            <div class="stat-label">Productos registrados</div>
            <div class="stat-value"><span th:text="${totalProductos}"></span></div>
        </div>
    </div>

    <div class="card" style="margin-top: 24px;">
        <h2 style="margin-bottom: 16px;">Productos con stock bajo</h2>

        <table th:if="${productosStockBajo != null and !productosStockBajo.isEmpty()}">
            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Stock actual</th>
                <th>Stock mínimo</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="producto : ${productosStockBajo}">
                <td th:text="${producto.id}"></td>
                <td th:text="${producto.nombre}"></td>
                <td th:text="${producto.stockActual}"></td>
                <td th:text="${producto.stockMinimo}"></td>
            </tr>
            </tbody>
        </table>

        <p th:if="${productosStockBajo == null or productosStockBajo.isEmpty()}">
            No hay productos con stock bajo.
        </p>
    </div>

    <a href="/" class="link-back">Volver al inicio</a>
</div>
</body>
</html>
