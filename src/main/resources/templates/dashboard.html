<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container">
    <h1 class="page-title">Dashboard del negocio</h1>
    <p class="subtitle">Resumen general de ventas, gastos y utilidad.</p>

    <div class="dashboard-grid">

        <div class="card">
            <h2>Hoy</h2>
            <p><strong>Ventas:</strong> $<span th:text="${ventasHoy}"></span></p>
            <p><strong>Gastos:</strong> $<span th:text="${gastosHoy}"></span></p>
            <p><strong>Ganancia:</strong> $<span th:text="${utilidadHoy}"></span></p>
        </div>

        <div class="card">
            <h2>Este mes</h2>
            <p><strong>Ventas:</strong> $<span th:text="${ventasMes}"></span></p>
            <p><strong>Gastos:</strong> $<span th:text="${gastosMes}"></span></p>
            <p><strong>Ganancia:</strong> $<span th:text="${utilidadMes}"></span></p>
        </div>

        <div class="card">
            <h2>Acumulado total</h2>
            <p><strong>Ventas:</strong> $<span th:text="${ventasTotales}"></span></p>
            <p><strong>Gastos:</strong> $<span th:text="${gastosTotales}"></span></p>
            <p><strong>Ganancia:</strong> $<span th:text="${utilidadTotal}"></span></p>
        </div>

        <div class="card">
            <h2>Inventario</h2>
            <p><strong>Total de productos:</strong> <span th:text="${totalProductos}"></span></p>
            <p><strong>Stock bajo:</strong> <span th:text="${productosStockBajo}"></span></p>
        </div>

    </div>

    <div class="actions-inline" style="margin-top: 20px;">
        <a th:href="@{/ventas/nueva}" class="btn">Ir al POS</a>
        <a th:href="@{/ventas}" class="btn btn-secondary">Historial de ventas</a>
        <a th:href="@{/gastos}" class="btn btn-secondary">Gastos</a>
        <a th:href="@{/}" class="btn btn-secondary">Inicio</a>
    </div>
</div>
</body>
</html>
